<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v7.2</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #bg-image {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('robot.jpg'); 
            background-size: cover;
            background-position: center right;
            filter: brightness(0.5) contrast(1.1);
        }
        #terminal {
            position: relative; z-index: 20;
            border: 1px solid #0f0; padding: 25px;
            background: rgba(0, 15, 0, 0.85);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            width: 85%; max-width: 420px;
            color: #0f0; backdrop-filter: blur(8px);
            border-radius: 5px;
            margin-right: auto; margin-left: 5%;
        }
        #clock { font-size: 2em; font-weight: bold; text-align: center; margin-bottom: 10px; }
        #output { height: 180px; overflow-y: auto; margin: 15px 0; font-size: 0.9em; line-height: 1.5; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #030; padding-top: 10px; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; font-size: 1.1em; }
    </style>
</head>
<body id="main-body">
    <div id="bg-image"></div>
    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="output">JOHNNY OS v7.2 ONLINE...<br>Klikněte pro aktivaci audia.</div>
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>
    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        let audioActive = false;

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'cs-CZ';
            utter.pitch = 0.8;
            window.speechSynthesis.speak(utter);
        }

        const activate = () => {
            if (!audioActive) {
                audioActive = true;
                const msg = "Systém oživen, Mistře.";
                addLog(msg);
                speak(msg);
            }
            input.focus();
        };

        document.body.addEventListener('click', activate);

        function addLog(text) {
            const p = document.createElement('div');
            p.innerHTML = `<span style="color: #0a0;">[LOG]:</span> ${text}`;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                let response = (cmd === 'hello') ? "Zdravím vás, Mistře." : "Příkaz neznám.";
                addLog(response);
                speak(response);
                input.value = '';
            }
        });
    </script>
</body>
</html>
