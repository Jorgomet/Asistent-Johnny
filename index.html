<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v2.0</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            border: 2px solid #0f0;
            padding: 20px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #0f0;
            width: 80%;
            max-width: 500px;
        }
        #clock {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: 1.2em;
            outline: none;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div>[ STATUS: ONLINE ]</div>
        <div>[ USER: MISTR ]</div>
        <hr style="border-color: #0f0;">
        <div id="output">Čekám na instrukce...</div>
        <div>> <input type="text" id="commandInput" placeholder="Zadej příkaz..." autofocus></div>
    </div>

    <script>
                input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                let response = "";

                if (cmd === 'hello' || cmd === 'ahoj') {
                    response = "Zdravím. Systém je plně funkční.";
                } else if (cmd === 'time' || cmd === 'cas') {
                    const now = new Date();
                    response = "Aktuální čas systému: " + now.toLocaleTimeString();
                } else if (cmd === 'vtip') {
                    const vtipy = [
                        "Proč se programátoři neradi opalují? Protože mají strach z bugů.",
                        "Hardware je to, do čeho můžete kopnout, když nefunguje software.",
                        "Existuje 10 druhů lidí: ti, kteří rozumí dvojkové soustavě, a ti, kteří ne."
                    ];
                    response = vtipy[Math.floor(Math.random() * vtipy.length)];
                } else if (cmd === 'clear') {
                    output.innerText = "Čekám na instrukce...";
                    input.value = '';
                    return;
                } else if (cmd === 'status') {
                    response = "CPU: Stabilní | Jádro: Online | Připojení: Šifrováno";
                } else {
                    response = "Příkaz '" + cmd + "' nebyl rozpoznán v databázi.";
                }

                output.innerText = response;
                input.value = '';
            }
        });
    </script>
</body>
</ht
