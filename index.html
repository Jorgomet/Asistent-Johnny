<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v7.7</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #bg-image {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('robot.jpg'); 
            background-size: cover;
            background-position: center right;
            filter: brightness(0.4) contrast(1.1);
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 10; pointer-events: none;
            opacity: 0.3;
        }

        #terminal {
            position: relative; z-index: 20;
            border: 1px solid #0f0; padding: 20px;
            background: rgba(0, 15, 0, 0.85);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            width: 85%; max-width: 450px;
            color: #0f0; backdrop-filter: blur(8px);
            border-radius: 5px;
            margin-right: auto; margin-left: 5%;
        }

        #clock { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 5px; text-shadow: 0 0 10px #0f0; }
        
        /* Indikátor paměti */
        #storage-status { font-size: 0.7em; text-align: center; margin-bottom: 10px; color: #0a0; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #output { height: 200px; overflow-y: auto; margin: 10px 0; font-size: 0.9em; line-height: 1.4; border-bottom: 1px solid #030; }
        .input-line { display: flex; align-items: center; padding-top: 5px; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; font-size: 1.1em; }

        .red-alert #terminal { border-color: #f00; box-shadow: 0 0 25px #f00; color: #f00; }
        .red-alert #bg-image { filter: brightness(0.3) sepia(1) hue-rotate(-50deg) saturate(3); }
        .red-alert #storage-status { color: #f00; }
    </style>
</head>
<body id="main-body">

    <div class="scanlines"></div>
    <div id="bg-image"></div>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="storage-status"><span class="blink">●</span> MEMORY_CHECK: WAITING...</div>
        <div id="output">
            [JOHNNY OS v7.7]<br>
            Audio: Ženský hlas připraven.<br>
            Dotkněte se displeje...
        </div>
        
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const body = document.getElementById('main-body');
        const storageStatus = document.getElementById('storage-status');
        let audioActive = false;

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/<br>/g, ' ');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'cs-CZ';
            utter.pitch = 1.3;
            utter.rate = 1.0;
            window.speechSynthesis.speak(utter);
        }

        // --- KONTROLA PAMĚTI ---
        function checkStorage() {
            let denik = JSON.parse(localStorage.getItem('johnny_db')) || [];
            if (denik.length > 0) {
                storageStatus.innerHTML = `<span style="color: #0f0;">● STORAGE: ACTIVE (${denik.length} záznamů)</span>`;
                return `V databázi jsem našla ${denik.length} vašich záznamů.`;
            } else {
                storageStatus.innerHTML = `● STORAGE: EMPTY`;
                return "Vaše paměť je zatím čistá, Mistře.";
            }
        }

        const activate = () => {
            if (!audioActive) {
                audioActive = true;
                const memInfo = checkStorage();
                const msg = "Vítejte zpět. " + memInfo;
                addLog(msg);
                speak(msg);
            }
            input.focus();
        };
        document.body.addEventListener('click', activate);
        document.body.addEventListener('touchstart', activate);

        function addLog(text) {
            const p = document.createElement('div');
            p.innerHTML = `<span style="color: #0a0;">[JOHNNY]:</span> ${text}`;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const rawVal = input.value.trim();
                const cmd = rawVal.toLowerCase();
                let response = "";

                if (cmd === 'hello' || cmd === 'ahoj') {
                    response = "Ráda vás vidím, Mistře. Jsem plně k dispozici.";
                } 
                else if (cmd.startsWith('zapis ')) {
                    const text = rawVal.substring(6);
                    let denik = JSON.parse(localStorage.getItem('johnny_db')) || [];
                    denik.push({ msg: text, time: new Date().toLocaleString() });
                    localStorage.setItem('johnny_db', JSON.stringify(denik));
                    checkStorage(); // Aktualizace kontrolky
                    response = "Uloženo. Teď si to budu pamatovat navždy.";
                }
                else if (cmd === 'denik') {
                    let denik = JSON.parse(localStorage.getItem('johnny_db')) || [];
                    if (denik.length === 0) {
                        response = "Deník je prázdný.";
                    } else {
                        response = "Vaše zápisky:<br>";
                        denik.forEach((item, i) => {
                            response += `${i+1}. ${item.msg}<br>`;
                        });
                    }
                }
                else if (cmd === 'smaz denik') {
                    localStorage.removeItem('johnny_db');
                    checkStorage();
                    response = "Paměť vymazána.";
                }
                else if (cmd === 'clear') {
                    output.innerHTML = "";
                    input.value = '';
                    return;
                }
                else {
                    response = "Zkuste: 'zapis [text]' nebo 'denik'.";
                }

                addLog(response);
                speak(response);
                input.value = '';
            }
        });
    </script>
</body>
</html>
