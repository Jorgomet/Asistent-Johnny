<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v8.0</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('robot.jpg'); 
            background-size: cover; background-position: center right;
            filter: brightness(0.4) contrast(1.1);
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; z-index: 10; pointer-events: none; opacity: 0.3;
        }

        #terminal {
            position: relative; z-index: 20; border: 1px solid #0f0; padding: 20px;
            background: rgba(0, 15, 0, 0.85); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            width: 85%; max-width: 450px; color: #0f0; backdrop-filter: blur(8px);
            border-radius: 5px; margin-right: auto; margin-left: 5%;
        }

        #clock { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 5px; }
        #storage-bar { font-size: 0.7em; text-align: center; margin-bottom: 10px; color: #0a0; border-bottom: 1px solid #030; padding-bottom: 5px; }
        #output { height: 220px; overflow-y: auto; margin: 10px 0; font-size: 0.9em; line-height: 1.4; }
        .input-line { display: flex; align-items: center; padding-top: 5px; border-top: 1px solid #030; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; font-size: 1.1em; }

        .red-alert #terminal { border-color: #f00; box-shadow: 0 0 25px #f00; color: #f00; }
        .red-alert #bg-image { filter: brightness(0.3) sepia(1) hue-rotate(-50deg) saturate(3); }
    </style>
</head>
<body id="main-body">

    <div class="scanlines"></div>
    <div id="bg-image"></div>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="storage-bar">NEURAL_STORAGE: OFFLINE</div>
        <div id="output">
            [JOHNNY OS v8.0]<br>
            SYNTH_VOICE: INITIALIZING...<br>
            Klikněte kamkoliv pro probuzení systému.
        </div>
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const body = document.getElementById('main-body');
        const storageBar = document.getElementById('storage-bar');
        let audioActive = false;
        let selectedVoice = null;

        // --- HLASOVÁ REKALIBRACE ---
        function initVoices() {
            const voices = window.speechSynthesis.getVoices();
            // Hledáme český hlas, prioritně Google nebo systémový
            selectedVoice = voices.find(v => v.lang.includes('cs-CZ')) || voices.find(v => v.lang.includes('cs')) || voices[0];
            if (selectedVoice) {
                console.log("Hlas vybrán: " + selectedVoice.name);
            }
        }
        window.speechSynthesis.onvoiceschanged = initVoices;
        initVoices();

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const utter = new SpeechSynthesisUtterance(text.replace(/<br>/g, ' '));
            utter.voice = selectedVoice;
            utter.lang = 'cs-CZ';
            utter.pitch = 1.0; // Plynulý, neutrální robotický tón
            utter.rate = 1.0;  // Standardní rychlost
            window.speechSynthesis.speak(utter);
        }

        // --- HODINY ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // --- PAMĚŤOVÝ MODUL ---
        function updateStorage() {
            const db = JSON.parse(localStorage.getItem('johnny_mem')) || [];
            storageBar.innerText = `NEURAL_STORAGE: ${db.length} ZÁZNAMŮ ACTIVE`;
            return db.length;
        }

        // --- AKTIVACE ---
        const wakeUp = () => {
            if (!audioActive) {
                audioActive = true;
                const count = updateStorage();
                const msg = `Vítejte zpět, Mistře. Systém je online a paměť obsahuje ${count} záznamů. Jaké jsou vaše rozkazy?`;
                addLog(msg);
                speak(msg);
            }
            input.focus();
        };

        document.body.addEventListener('click', wakeUp);
        document.body.addEventListener('touchstart', wakeUp);

        function addLog(text) {
            const p = document.createElement('div');
            p.innerHTML = `<span style="color: #0a0;">[JOHNNY]:</span> ${text}`;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        // --- PŘÍKAZY ---
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const raw = input.value.trim();
                const cmd = raw.toLowerCase();
                let res = "";

                if (cmd.startsWith('zapis ')) {
                    const note = raw.substring(6);
                    let db = JSON.parse(localStorage.getItem('johnny_mem')) || [];
                    db.push({ text: note, time: new Date().toLocaleString() });
                    localStorage.setItem('johnny_mem', JSON.stringify(db));
                    updateStorage();
                    res = "Zápis byl uložen do mé dlouhodobé paměti.";
                }
                else if (cmd === 'denik') {
                    let db = JSON.parse(localStorage.getItem('johnny_mem')) || [];
                    if (db.length === 0) res = "Zatím si nic nepamatuji.";
                    else {
                        res = "Zde jsou vaše záznamy:<br>";
                        db.forEach((item, i) => { res += `${i+1}. ${item.text}<br>`; });
                    }
                }
                else if (cmd === 'smaz denik') {
                    localStorage.removeItem('johnny_mem');
                    updateStorage();
                    res = "Paměť byla kompletně vymazána.";
                }
                else if (cmd === 'status') {
                    res = "Všechny systémy nominální. Hlasový engine i storage jsou připraveny.";
                }
                else if (cmd === 'red alert') {
                    body.classList.add('red-alert');
                    res = "Pozor! Bojový režim aktivován.";
                }
                else if (cmd === 'normal') {
                    body.classList.remove('red-alert');
                    res = "Režim normalizován.";
                }
                else if (cmd === 'clear') {
                    output.innerHTML = "";
                    input.value = '';
                    return;
                }
                else {
                    res = "Příkaz nebyl rozpoznán. Zkuste: zapis [text], denik nebo status.";
                }

                addLog(res);
                speak(res);
                input.value = '';
            }
        });
    </script>
</body>
</html>
