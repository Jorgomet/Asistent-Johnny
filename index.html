<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v3.0 - Memory</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            border: 2px solid #0f0;
            padding: 20px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #0f0;
            width: 90%;
            max-width: 500px;
        }
        #clock { font-size: 1.8em; margin-bottom: 10px; text-align: center; }
        #output { height: 120px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #030; }
        .input-line { display: flex; }
        .prompt { margin-right: 10px; }
        input {
            background: transparent; border: none; color: #0f0;
            font-family: inherit; font-size: 1em; outline: none; width: 100%;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="user-status" style="font-size: 0.7em; color: #0a0;">[ SYSTÉM INICIALIZOVÁN ]</div>
        <hr style="border-color: #0f0;">
        <div id="output">Inicializace paměti...</div>
        <div class="input-line">
            <span class="prompt">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const userStatus = document.getElementById('user-status');

        // Funkce pro hodiny
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // NAČTENÍ PAMĚTI (localStorage)
        function checkMemory() {
            const savedName = localStorage.getItem('johnny_username');
            if (savedName) {
                userStatus.innerText = "[ PŘIHLÁŠEN: " + savedName.toUpperCase() + " ]";
                output.innerText = "Vítejte zpět, " + savedName + ". Systém je připraven.";
            } else {
                output.innerText = "Vítejte. Jak vás mám oslovovat? (Napište: jmenuji se [vaše jméno])";
            }
        }
        checkMemory();

        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const rawCmd = input.value.trim();
                const cmd = rawCmd.toLowerCase();
                let response = "";

                if (cmd.startsWith('jmenuji se ')) {
                    const name = rawCmd.split(' ').slice(2).join(' ');
                    localStorage.setItem('johnny_username', name);
                    userStatus.innerText = "[ PŘIHLÁŠEN: " + name.toUpperCase() + " ]";
                    response = "Rozumím. Budu si pamatovat, že jste " + name + ".";
                } else if (cmd === 'hello' || cmd === 'ahoj') {
                    const name = localStorage.getItem('johnny_username') || "Mistře";
                    response = "Zdravím vás, " + name + ". Všechny systémy běží na 100%.";
                } else if (cmd === 'kdo jsem') {
                    const name = localStorage.getItem('johnny_username');
                    response = name ? "Jste " + name + ". Moje biometrická data nelžou." : "Zatím vás neznám. Představte se příkazem 'jmenuji se ...'.";
                } else if (cmd === 'zapomen') {
                    localStorage.removeItem('johnny_username');
                    userStatus.innerText = "[ SYSTÉM RESETOVÁN ]";
                    response = "Paměť vymazána. Kdo jste?";
                } else if (cmd === 'cas') {
                    response = "Aktuální čas: " + new Date().toLocaleTimeString();
                } else if (cmd === 'vtip') {
                    const vtipy = [
                        "Proč programátoři preferují tmavý režim? Protože světlo přitahuje bugy.",
                        "Hardware je to, do čeho můžeš kopnout. Software je to, co můžeš jen proklínat."
                    ];
                    response = vtipy[Math.floor(Math.random() * vtipy.length)];
                } else if (cmd === 'clear') {
                    output.innerText = "Terminál vyčištěn...";
                    input.value = '';
                    return;
                } else {
                    response = "Příkaz '" + cmd + "' neznám. Pro uložení jména zadej: jmenuji se [jméno]";
                }

                output.innerText = response;
                input.value = '';
            }
        });

        document.body.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
