<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v7.0</title>
    <style>
        /* Základní nastavení */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* POZADÍ - STATICKÝ OBRÁZEK */
        #bg-image {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: url('robot.jpg'); /* Johnny hledá tento soubor */
            background-size: cover;
            background-position: center right; /* Robot bude vpravo */
            filter: brightness(0.5) contrast(1.1);
            transition: all 0.5s ease;
        }

        /* CRT Efekt skenovacích čar */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 10; pointer-events: none;
        }

        /* TERMINÁL */
        #terminal {
            position: relative; z-index: 20;
            border: 1px solid #0f0; padding: 20px;
            background: rgba(0, 15, 0, 0.85);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            width: 80%; max-width: 450px;
            color: #0f0; backdrop-filter: blur(8px);
            border-radius: 4px;
            margin-right: auto; margin-left: 5%; /* Terminál vlevo, robot vpravo */
        }

        #clock { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 10px; color: #0f0; }
        #output { height: 180px; overflow-y: auto; margin: 10px 0; font-size: 0.85em; line-height: 1.4; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #030; padding-top: 10px; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; font-size: 1em; }

        /* Režim RED ALERT */
        .red-alert #terminal { border-color: #f00; box-shadow: 0 0 25px #f00; color: #f00; }
        .red-alert input { color: #f00; }
        .red-alert #bg-image { filter: brightness(0.4) sepia(1) hue-rotate(-50deg) saturate(3); }
        .red-alert #clock { color: #f00; }
    </style>
</head>
<body id="main-body">

    <div class="scanlines"></div>
    <div id="bg-image"></div>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="output">JOHNNY OS v7.0_CORE...<br>Status: Stabilní<br>Dotkněte se displeje pro audio.</div>
        
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">"
        </div>
    </div>

    <script>
            input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const rawCmd = input.value.trim();
                const cmd = rawCmd.toLowerCase();
                let response = "";

                // --- NOVÉ PŘÍKAZY PRO PAMĚŤ ---

                // 1. Uložení zápisku: zapis [text]
                if (cmd.startsWith('zapis ')) {
                    const poznamka = rawCmd.substring(6); // Vezme text za slovem "zapis "
                    let denik = JSON.parse(localStorage.getItem('johnny_denik')) || [];
                    denik.push({ text: poznamka, datum: new Date().toLocaleString() });
                    localStorage.setItem('johnny_denik', JSON.stringify(denik));
                    response = "Zápis uložen do neurální sítě, Mistře.";
                }

                // 2. Výpis zápisků: denik
                else if (cmd === 'denik') {
                    let denik = JSON.parse(localStorage.getItem('johnny_denik')) || [];
                    if (denik.length === 0) {
                        response = "Váš deník je zatím prázdný.";
                    } else {
                        response = "Vaše záznamy:<br>";
                        denik.forEach((item, index) => {
                            response += `${index + 1}. [${item.datum}] ${item.text}<br>`;
                        });
                    }
                }

                // 3. Smazání paměti: smaz denik
                else if (cmd === 'smaz denik') {
                    localStorage.removeItem('johnny_denik');
                    response = "Všechny záznamy byly vymazány.";
                }

                // --- PŮVODNÍ PŘÍKAZY ---
                else if (cmd === 'hello' || cmd === 'ahoj') {
                    response = "Zdravím vás, Mistře. Jsem připraven.";
                } else if (cmd === 'status') {
                    response = "Všechny systémy nominální. Paměť aktivní.";
                } else if (cmd === 'clear') {
                    output.innerHTML = "";
                    input.value = '';
                    return;
                } else {
                    response = "Příkaz '" + cmd + "' neznám.";
                }

                addLog(response);
                speak(response);
                input.value = '';
            }
        });

    </script>
</body>
</html>
