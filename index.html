<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny System v8.2</title>
    <style>
        /* Celkové rozvržení */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* POZADÍ - ROBOT VPRAVO */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('robot.jpg'); 
            background-size: cover; background-position: center right;
            filter: brightness(0.4) contrast(1.1);
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; z-index: 10; pointer-events: none; opacity: 0.3;
        }

        /* TERMINÁL VLEVO */
        #terminal {
            position: relative; z-index: 20; border: 1px solid #0f0; padding: 20px;
            background: rgba(0, 15, 0, 0.85); box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            width: 85%; max-width: 450px; color: #0f0; backdrop-filter: blur(8px);
            border-radius: 5px; margin-right: auto; margin-left: 5%;
        }

        #clock { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 5px; }
        #storage-bar { font-size: 0.7em; text-align: center; margin-bottom: 10px; color: #0a0; border-bottom: 1px solid #030; padding-bottom: 5px; }
        #output { height: 230px; overflow-y: auto; margin: 10px 0; font-size: 0.9em; line-height: 1.4; }
        .input-line { display: flex; align-items: center; padding-top: 5px; border-top: 1px solid #030; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; font-size: 1.1em; }

        /* Režimy */
        .red-alert #terminal { border-color: #f00; box-shadow: 0 0 25px #f00; color: #f00; }
        .red-alert #bg-image { filter: brightness(0.3) sepia(1) hue-rotate(-50deg) saturate(3); }
    </style>
</head>
<body id="main-body">

    <div class="scanlines"></div>
    <div id="bg-image"></div>

    <div id="terminal">
        <div id="clock">00:00:00</div>
        <div id="storage-bar">SYSTEM_MEM: SYNCHRONIZING...</div>
        <div id="output">
            [JOHNNY OS v8.2]<br>
            Neural Voice Engine: READY<br>
            Status: Čekám na autorizaci...<br><br>
            Klikněte pro aktivaci hlasu.
        </div>
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const body = document.getElementById('main-body');
        const storageBar = document.getElementById('storage-bar');
        let audioActive = false;

        // --- HLASOVÝ ENGINE ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const utter = new SpeechSynthesisUtterance(text.replace(/<br>/g, ' '));
            utter.lang = 'cs-CZ';
            
            // Hledání nejlepšího hlasu (plynulý robotický/lidský)
            const voices = window.speechSynthesis.getVoices();
            const bestVoice = voices.find(v => v.lang.includes('cs') && v.name.includes('Google')) || 
                               voices.find(v => v.lang.includes('cs')) || voices[0];
            
            if (bestVoice) utter.voice = bestVoice;
            
            utter.pitch = 1.0; // Neutrální tón
            utter.rate = 1.0;  // Přirozená rychlost
            window.speechSynthesis.speak(utter);
        }

        // --- PAMĚŤ (STORAGE) ---
        function updateStorage() {
            const db = JSON.parse(localStorage.getItem('johnny_db')) || [];
            storageBar.innerText = `DATABASE: ${db.length} ZÁZNAMŮ`;
            return db.length;
        }

        // --- HODINY ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // --- AKTIVACE KLIKNUTÍM ---
        const startSystem = () => {
            if (!audioActive) {
                audioActive = true;
                const count = updateStorage();
                const msg = `Vítejte, Mistře. Jsem online. V databázi mám ${count} záznamů. Poslouchám vás.`;
                addLog(msg);
                speak(msg);
            }
            input.focus();
        };

        document.body.addEventListener('click', startSystem);
        document.body.addEventListener('touchstart', startSystem);

        function addLog(text) {
            const p = document.createElement('div');
            p.innerHTML = `<span style="color: #0a0;">[JOHNNY]:</span> ${text}`;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        // --- ZPRACOVÁNÍ PŘÍKAZŮ ---
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const raw = input.value.trim();
                const cmd = raw.toLowerCase();
                let res = "";

                // Ukládání (zapis ...)
                if (cmd.startsWith('zapis ')) {
                    const note = raw.substring(6);
                    let db = JSON.parse(localStorage.getItem('johnny_db')) || [];
                    db.push({ text: note, time: new Date().toLocaleString() });
                    localStorage.setItem('johnny_db', JSON.stringify(db));
                    updateStorage();
                    res = "Zápis uložen do dlouhodobé paměti.";
                }
                // Výpis deníku
                else if (cmd === 'denik') {
                    let db = JSON.parse(localStorage.getItem('johnny_db')) || [];
                    if (db.length === 0) res = "Paměť je prázdná.";
                    else {
                        res = "Vaše záznamy:<br>";
                        db.forEach((item, i) => { res += `${i+1}. ${item.text}<br>`; });
                    }
                }
                // Smazání
                else if (cmd === 'smaz denik') {
                    localStorage.removeItem('johnny_db');
                    updateStorage();
                    res = "Databáze byla vymazána.";
                }
                // Ostatní
                else if (cmd === 'hello' || cmd === 'ahoj') res = "Zdravím vás, Mistře.";
                else if (cmd === 'status') res = "Hlas plynulý. Storage aktivní. Systém nominální.";
                else if (cmd === 'red alert') { body.classList.add('red-alert'); res = "POZOR! Bojový režim!"; }
                else if (cmd === 'normal') { body.classList.remove('red-alert'); res = "Návrat do normálu."; }
                else if (cmd === 'clear') { output.innerHTML = ""; input.value = ''; return; }
                else { res = "Neznámý příkaz. Zkuste: zapis [text], denik nebo red alert."; }

                addLog(res);
                speak(res);
                input.value = '';
            }
        });
    </script>
</body>
</html>
