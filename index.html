<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny v5.2 - Micro Lite</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        
        /* Pozadí - Video */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -1; filter: brightness(0.4);
            object-fit: cover;
        }

        #terminal {
            position: relative; z-index: 10;
            margin: 20px auto; width: 85%; max-width: 500px;
            border: 1px solid #0f0; background: rgba(0, 10, 0, 0.8);
            color: #0f0; padding: 20px; box-shadow: 0 0 15px #0f0;
            top: 50%; transform: translateY(-50%);
        }
        #output { height: 150px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #030; }
        .input-line { display: flex; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 100%; font-family: inherit; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="robot.mp4" type="video/mp4">
        <source src="https://raw.githubusercontent.com/Jorgomet/ASISTENT-JOHNNY/main/robot.mp4" type="video/mp4">
    </video>

    <div id="terminal">
        <div style="text-align:center; font-weight:bold;">[ JOHNNY LITE v5.2 ]</div>
        <hr style="border-color:#0f0">
        <div id="output">Systém online. Čekám na Mastera...</div>
        <div class="input-line">
            <span style="margin-right:10px;">></span>
            <input type="text" id="commandInput" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase();
                let resp = "Příkaz neznám.";
                
                if (cmd === 'hello') resp = "Zdravím, Mistře.";
                else if (cmd === 'status') resp = "Všechny systémy běží v úsporném režimu.";
                else if (cmd.startsWith('jmenuji se ')) {
                    const name = cmd.split(' ')[2];
                    localStorage.setItem('name', name);
                    resp = "Budu vám říkat " + name;
                }

                const p = document.createElement('div');
                p.innerHTML = `<span style="color:#0a0">></span> ${resp}`;
                output.appendChild(p);
                input.value = '';
                output.scrollTop = output.scrollHeight;
            }
        });
        document.body.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
